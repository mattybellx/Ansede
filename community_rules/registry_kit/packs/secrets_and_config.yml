version: "1.0"
rules:
  - id: "COMM-SECRETS-001"
    title: "Hardcoded credential-like value"
    description: "Detect common hardcoded API keys, tokens, and passwords in source files."
    severity: "high"
    cwe: "CWE-798"
    category: "security"
    languages: ["python", "javascript", "typescript", "java", "csharp", "go"]
    pattern: "(API_KEY|SECRET|TOKEN|PASSWORD)\\s*[:=]\\s*['\"][^'\"]{8,}['\"]"
    suggestion: "Move secrets to environment variables or a managed secrets store."

  - id: "COMM-CONFIG-002"
    title: "Debug or insecure runtime setting enabled"
    description: "Detect insecure runtime toggles such as debug=true or verify=false."
    severity: "medium"
    cwe: "CWE-1188"
    category: "security"
    languages: ["python", "javascript", "typescript"]
    pattern: "(debug\\s*=\\s*True|verify\\s*=\\s*False|NODE_TLS_REJECT_UNAUTHORIZED\\s*=\\s*['\"]0['\"])"
    suggestion: "Disable debug/insecure TLS settings in production configuration."
