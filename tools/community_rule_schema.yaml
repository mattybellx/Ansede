schema_version: "1.0"
title: "Ansede Static community rule schema"
type: object
required:
  - id
  - title
  - cwe
  - severity
  - language
  - pattern
  - test
properties:
  id:
    type: string
    description: "Stable globally unique community rule id, e.g. community/flask-missing-rate-limit-CWE-307"
  title:
    type: string
  cwe:
    type: string
    pattern: "^CWE-[0-9]+$"
  severity:
    type: string
    enum:
      - critical
      - high
      - medium
      - low
      - info
  language:
    type: string
    enum:
      - python
      - javascript
      - typescript
      - java
      - csharp
      - go
  pattern:
    type: object
    required:
      - type
    properties:
      type:
        type: string
        enum:
          - ast_structural
          - regex
          - taint_sink
      route_decorator:
        type: string
      missing_decorator:
        type: array
        items:
          type: string
      regex:
        type: string
      sink:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
  tags:
    type: array
    items:
      type: string
  test:
    type: object
    required:
      - positive
      - negative
    properties:
      positive:
        type: string
      negative:
        type: string
  author:
    type: string
  created:
    type: string
  references:
    type: array
    items:
      type: string
notes:
  - "This schema is documentation-first so it can be enforced by Ansede's zero-dependency validator."
  - "Community rules are single-rule YAML files; classic custom rule bundles still use a top-level rules list."
