name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write   # for SARIF upload

jobs:
  # ── Unit tests on every supported Python version ─────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/ --tb=short -q
      - name: CVE pattern benchmark
        run: python -m benchmarks.nvd_benchmark --fail-under 90 --quiet

  extension:
    name: VS Code extension build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm install
      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

  # ── Self-scan: scan ansede-static with ansede-static ─────────────────────
  scan:
    name: Self-scan (SARIF)
    runs-on: ubuntu-latest
    needs: [test, extension]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Scan src/
        run: ansede-static src/ --format sarif --output ansede.sarif --fail-on never
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ansede.sarif
          category: ansede-static
