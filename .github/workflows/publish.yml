name: Publish to PyPI

# Primary path: run after the Release workflow succeeds.
# Fallback path: manual dispatch for emergency republish.
#
# Uses PyPI Trusted Publishing via GitHub OIDC.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish to PyPI
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build distribution
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI (trusted publishing)
        id: publish_trusted
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to PyPI (API token fallback)
        id: publish_token
        if: steps.publish_trusted.outcome == 'failure'
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Fail if no publish path succeeded
        if: steps.publish_trusted.outcome == 'failure' && steps.publish_token.outcome == 'failure'
        run: |
          echo "PyPI publish failed via trusted publishing, and API token fallback was unavailable or failed."
          echo "Action needed: either configure PyPI trusted publisher to match this workflow or set repository secret PYPI_API_TOKEN."
          exit 1
