name: Publish to PyPI

# Fires automatically when a GitHub Release is published (created by release.yml
# for each v* tag). Supports both:
#   1) Trusted Publishing (recommended, no long-lived token)
#   2) API token fallback via PYPI_API_TOKEN secret

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for Trusted Publishing (OIDC) if you enable it

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build distribution
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to PyPI (API token fallback)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
