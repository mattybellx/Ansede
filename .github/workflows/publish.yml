name: Publish to PyPI

# Fires automatically when a GitHub Release is published (which the release.yml
# workflow creates for every v* tag).  All you need is a PyPI API token stored
# as a repository secret called PYPI_API_TOKEN.
#
# How to set that up (one-time):
#   1. Go to https://pypi.org/manage/account/token/ and create a token scoped
#      to the "ansede-static" project (or whole account for a new project).
#   2. Go to https://github.com/mattybellx/Ansede/settings/secrets/actions
#      and add a secret named  PYPI_API_TOKEN  with that token value.
#   3. Push a new v* tag — this workflow will publish automatically.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for Trusted Publishing (OIDC) if you enable it

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi   # optional: add a "pypi" environment in repo settings for protection

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build distribution
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
